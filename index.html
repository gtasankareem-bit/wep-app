<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أستريتز X</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ريسيت وتأثيرات بصرية راقية */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #000000; 
            color: #e7e9ea; 
            padding-bottom: 80px; 
            overflow-x: hidden; 
        }

        /* الهيدر الفخم للمنصة */
        .app-header {
            position: sticky;
            top: 0;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #2f3336;
            padding: 12px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 999;
            color: #1d9bf0;
        }
        
        /* شريط التنقل السفلي الاحترافي */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background-color: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid #2f3336; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            z-index: 1000; 
        }
        .nav-item { 
            color: #71767b; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px;
            cursor: pointer; 
            transition: color 0.2s ease, transform 0.1s ease; 
        }
        .nav-item:active { transform: scale(0.92); }
        .nav-item.active { color: #1d9bf0; }
        .nav-icon { font-size: 22px; }
        
        /* تأثيرات حركة الصفحات */
        .page { display: none; padding: 15px; animation: slideUpSmooth 0.3s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .page.active { display: block; }
        @keyframes slideUpSmooth { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* تصميم كروت المنشورات */
        .tweet { display: flex; gap: 14px; border-bottom: 1px solid #2f3336; padding: 18px 10px; transition: background 0.2s ease; }
        .tweet:hover { background-color: rgba(255, 255, 255, 0.01); }
        .tweet-avatar { width: 44px; height: 44px; border-radius: 50%; background-color: #202327; flex-shrink: 0; object-fit: cover; border: 1px solid #2f3336; }
        .tweet-body { flex-grow: 1; }
        .tweet-header { font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .tweet-author { color: #e7e9ea; display: flex; align-items: center; gap: 5px; }
        .tweet-admin-badge { background: linear-gradient(45deg, #ffd700, #b8860b); color: #000000; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: bold; }
        .tweet-text { font-size: 15px; color: #e7e9ea; line-height: 1.6; margin-bottom: 14px; white-space: pre-wrap; word-break: break-word; }
        
        /* أزرار التفاعل */
        .tweet-actions { display: flex; justify-content: space-between; align-items: center; color: #71767b; font-size: 13px; max-width: 340px; }
        .action-btn { display: flex; align-items: center; gap: 7px; cursor: pointer; transition: color 0.2s, background 0.2s; padding: 6px 10px; border-radius: 20px; }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.comment-trigger:hover { color: #1d9bf0; background: rgba(29, 155, 240, 0.1); }
        .action-btn.like-trigger:hover { color: #f91880; background: rgba(249, 24, 128, 0.1); }
        .action-btn.liked { color: #f91880; font-weight: bold; }
        .action-btn.report-trigger:hover { color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .admin-delete { color: #f4212e; font-weight: bold; }
        .admin-delete:hover { background: rgba(244, 33, 46, 0.1); }

        /* حاوية صندوق الكتابة الفاخر */
        .write-box { display: flex; gap: 14px; margin-top: 10px; align-items: flex-start; }
        textarea { width: 100%; background-color: transparent; border: none; color: #ffffff; font-family: 'Cairo', sans-serif; font-size: 18px; resize: none; min-height: 140px; outline: none; padding-top: 5px; }
        .line-divider { height: 1px; background-color: #2f3336; margin: 15px 0; }
        
        .submit-btn { 
            background-color: #1d9bf0; 
            color: white; 
            border: none; 
            padding: 10px 26px; 
            font-family: 'Cairo', sans-serif; 
            font-weight: 700; 
            font-size: 15px; 
            border-radius: 25px; 
            cursor: pointer; 
            float: left; 
            transition: background 0.2s, opacity 0.2s; 
        }
        .submit-btn:hover { background-color: #1a8cd8; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* مودال التعليقات المنبثق */
        .comments-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 2000; padding: 20px 15px; overflow-y: auto; }
        .comments-modal.active { display: block; animation: slideModalUp 0.25s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideModalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { font-size: 15px; color: #1d9bf0; cursor: pointer; margin-bottom: 20px; display: inline-block; font-weight: bold; background: rgba(29,155,240,0.08); padding: 6px 14px; border-radius: 20px; }
        
        /* صندوق إدخال رد جديد */
        .comment-input-bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; gap: 10px; background: #000000; border-top: 1px solid #2f3336; padding: 12px 15px; z-index: 2100; }
        .comment-input-bar input { flex-grow: 1; background: #16181c; border: 1px solid #2f3336; border-radius: 25px; padding: 12px 18px; color: white; outline: none; font-family: 'Cairo'; font-size: 14px; transition: border 0.2s; }
        .comment-input-bar input:focus { border-color: #1d9bf0; }
        .comment-post-btn { background: #1d9bf0; border: none; color: white; border-radius: 25px; padding: 0 22px; font-weight: 700; font-family: 'Cairo'; cursor: pointer; }
        
        /* كروت الردود */
        .comment-card { margin-top: 12px; padding: 14px; background: #16181c; border-radius: 14px; border: 1px solid #2f3336; animation: slideUpSmooth 0.2s ease; }
    </style>
</head>
<body>

    <div class="app-header">✨ منصة أستريتز ✨</div>

    <div id="feed-page" class="page active">
        <div id="posts-container"></div>
    </div>

    <div id="write-page" class="page">
        <div class="write-box">
            <img id="my-avatar-writing" src="https://via.placeholder.com/44" class="tweet-avatar">
            <textarea id="post-text" placeholder="ماذا يدور في عقلك الفخم؟..."></textarea>
        </div>
        <div class="line-divider"></div>
        <button id="submit-post-btn" class="submit-btn" onclick="publishPost()">نشر المنشور</button>
        <div style="clear: both;"></div>
    </div>

    <div id="profile-page" class="page">
        <div style="text-align: center; margin: 25px 0;">
            <img id="user-img" src="https://via.placeholder.com/80" style="width:85px; height:85px; border-radius:50%; object-fit:cover; border: 2px solid #1d9bf0; box-shadow: 0 0 15px rgba(29,155,240,0.2); margin-bottom:12px;">
            <h2 id="user-name" style="font-size: 22px; font-weight: 700;">عضو جديد</h2>
            <p id="user-tagged-id" style="color: #71767b; font-size: 13px; margin-top: 4px;"></p>
        </div>
        <div class="line-divider"></div>
        <h3 style="font-size: 15px; margin-bottom: 15px; color: #71767b; padding-right: 5px;">🗂️ أرشيف منشوراتك الحالية:</h3>
        <div id="my-posts-container"></div>
    </div>

    <div id="comments-modal" class="comments-modal">
        <span class="close-modal" onclick="closeComments()">✕ إغلاق والعودة</span>
        <div id="active-post-view" style="border-bottom: 1px solid #2f3336; padding-bottom: 18px; margin-bottom: 15px;"></div>
        <div id="comments-list" style="padding-bottom: 80px;"></div>
        <div class="comment-input-bar">
            <input type="text" id="comment-text" placeholder="اكتب ردك اللبق هنا...">
            <button class="comment-post-btn" onclick="addComment()">رد</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('feed-page', this)">
            <span class="nav-icon">🏠</span><span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="switchPage('write-page', this)">
            <span class="nav-icon">✍️</span><span>نشر بوست</span>
        </div>
        <div class="nav-item" onclick="switchPage('profile-page', this)">
            <span class="nav-icon">👤</span><span>حسابي</span>
        </div>
    </div>

    <script>
        // إعداد تليجرام
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const ADMIN_ID = 7174983919; 
        // رابط السيرفر الخاص بك
        const API_URL = "https://51.68.34.78:20230";";

        window.currentPosts = [];
        let currentUser = { id: 9999, name: "زائر أستريتز", photo: "https://via.placeholder.com/44" };

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            currentUser = {
                id: tg.initDataUnsafe.user.id,
                name: tg.initDataUnsafe.user.first_name + (tg.initDataUnsafe.user.last_name ? " " + tg.initDataUnsafe.user.last_name : ""),
                photo: tg.initDataUnsafe.user.photo_url || "https://via.placeholder.com/44"
            };
        }
        
        // ربط بيانات البروفايل
        document.getElementById('user-name').innerText = currentUser.name;
        document.getElementById('user-img').src = currentUser.photo;
        document.getElementById('my-avatar-writing').src = currentUser.photo;
        document.getElementById('user-tagged-id').innerText = "آي دي: " + currentUser.id;

        let activePostId = null;

        // التنقل بين الصفحات
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            if(pageId === 'feed-page' || pageId === 'profile-page') renderPosts();
        }

        // جلب الداتا وعرضها بأمان
        function renderPosts() {
            fetch(`${API_URL}/get_posts`)
            .then(res => {
                if(!res.ok) throw new Error("استجابة السيرفر غير صالحة");
                return res.json();
            })
            .then(posts => {
                window.currentPosts = posts;
                
                const feedContainer = document.getElementById('posts-container');
                const profileContainer = document.getElementById('my-posts-container');
                
                if(feedContainer) feedContainer.innerHTML = posts.length === 0 ? "<p style='text-align:center; color:#71767b; margin-top:40px;'>لا توجد منشورات حقيقية، كن أول من ينشر سحره! ✨</p>" : "";
                if(profileContainer) profileContainer.innerHTML = "";

                posts.forEach(post => {
                    const likedByArray = Array.isArray(post.likedBy) ? post.likedBy : [];
                    const isLiked = likedByArray.includes(currentUser.id);
                    const isAdmin = currentUser.id === ADMIN_ID;
                    const adminBadge = post.authorId === ADMIN_ID ? "<span class='tweet-admin-badge'>👑 المالك</span>" : "";
                    
                    const tweetHTML = `
                        <div class="tweet" id="post-${post.id}">
                            <img src="${post.authorPhoto || 'https://via.placeholder.com/44'}" class="tweet-avatar">
                            <div class="tweet-body">
                                <div class="tweet-header">
                                    <span class="tweet-author">${post.authorName} ${adminBadge}</span>
                                </div>
                                <div class="tweet-text">${post.text}</div>
                                <div class="tweet-actions">
                                    <div class="action-btn like-trigger ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                        <span>${isLiked ? '❤️' : '🤍'}</span> <span>${likedByArray.length}</span>
                                    </div>
                                    <div class="action-btn comment-trigger" onclick="openComments(${post.id})">
                                        <span>💬</span> <span>${Array.isArray(post.comments) ? post.comments.length : 0}</span>
                                    </div>
                                    <div class="action-btn report-trigger" onclick="reportPost(${post.id})">
                                        <span>🚩</span> <span>بلاغ</span>
                                    </div>
                                    ${isAdmin || post.authorId === currentUser.id ? `<div class="action-btn admin-delete" onclick="deletePost(${post.id})">🗑️ حذف</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    if(feedContainer) feedContainer.innerHTML += tweetHTML;
                    if(profileContainer && post.authorId === currentUser.id) {
                        profileContainer.innerHTML += tweetHTML;
                    }
                });
                
                if (profileContainer && profileContainer.innerHTML === "") {
                    profileContainer.innerHTML = "<p style='text-align:center; color:#71767b; margin-top:20px;'>لم تقم بنشر أي بوست بعد!</p>";
                }
            })
            .catch(err => {
                console.error(err);
                const container = document.getElementById('posts-container');
                if(container) container.innerHTML = "<p style='text-align:center; color:#e11d48; margin-top:40px; padding: 20px;'>❌ تعذر الاتصال بالسيرفر. يرجى التأكد من تشغيل ملف Python.</p>";
            });
        }

        // كود النشر الاحترافي
        function publishPost() {
            const txt = document.getElementById('post-text').value.trim();
            if(!txt) return;
            
            const btn = document.getElementById('submit-post-btn');
            btn.disabled = true;
            btn.innerText = "جاري النشر...";

            fetch(`${API_URL}/add_post`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    authorId: currentUser.id,
                    authorName: currentUser.name,
                    authorPhoto: currentUser.photo,
                    text: txt
                })
            })
            .then(res => {
                if(!res.ok) throw new Error("تعذر النشر");
                return res.json();
            })
            .then(() => {
                btn.disabled = false;
                btn.innerText = "نشر المنشور";
                document.getElementById('post-text').value = ''; 
                switchPage('feed-page', document.querySelectorAll('.nav-bar .nav-item')[0]);
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerText = "نشر المنشور";
                alert("❌ فشل النشر! السيرفر لم يستجب، تأكد من اتصال الـ API.");
            });
        }

        // نظام التفاعل (اللايكات)
        function toggleLike(postId) {
            fetch(`${API_URL}/toggle_like`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ postId: postId, userId: currentUser.id })
            })
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(() => renderPosts())
            .catch(() => alert("❌ فشل تسجيل الإعجاب. تأكد من السيرفر."));
        }

        // فتح الكومنتات بأمان
        function openComments(postId) {
            activePostId = postId;
            const post = window.currentPosts.find(p => p.id === postId);
            if(!post) return;
            
            document.getElementById('comments-modal').classList.add('active');
            renderCommentsView(post);
        }

        function closeComments() {
            document.getElementById('comments-modal').classList.remove('active');
            activePostId = null;
            renderPosts();
        }

        // عرض التعليقات
        function renderCommentsView(post) {
            document.getElementById('active-post-view').innerHTML = `
                <div style="font-size:16px; color:#e7e9ea; line-height:1.6; white-space:pre-wrap; font-weight:600;">${post.text}</div>
                <div style="font-size:12px; color:#1d9bf0; margin-top:10px; font-weight:bold;">الردود الحية 👇</div>
            `;
            const list = document.getElementById('comments-list');
            const commentsArray = Array.isArray(post.comments) ? post.comments : [];
            list.innerHTML = commentsArray.length === 0 ? "<div style='color:#71767b; font-size:13px; text-align:center; margin-top:25px;'>لا توجد أي تعليقات حقيقية هنا، كُن أول من يرد!</div>" : "";
            
            commentsArray.forEach(c => {
                list.innerHTML += `
                    <div class="comment-card">
                        <strong style="color:#1d9bf0; font-size:13px; display:block; margin-bottom:3px;">👤 ${c.authorName}</strong>
                        <div style="color:#e7e9ea; font-size:14px; line-height:1.5;">${c.text}</div>
                    </div>
                `;
            });
        }

        // إضافة رد
        function addComment() {
            const txt = document.getElementById('comment-text').value.trim();
            if(!txt || !activePostId) return;
            
            const btn = document.querySelector('.comment-post-btn');
            btn.disabled = true;

            fetch(`${API_URL}/add_comment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ postId: activePostId, authorName: currentUser.name, text: txt })
            })
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(() => {
                btn.disabled = false;
                document.getElementById('comment-text').value = '';
                // تحديث مباشر للكومنتات
                fetch(`${API_URL}/get_posts`).then(res => res.json()).then(posts => {
                    window.currentPosts = posts;
                    const post = posts.find(p => p.id === activePostId);
                    if(post) renderCommentsView(post);
                });
            })
            .catch(() => {
                btn.disabled = false;
                alert("❌ فشل إضافة التعليق.");
            });
        }

        // نظام البلاغات
        function reportPost(postId) {
            fetch(`${API_URL}/report_post`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ postId: postId })
            })
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(() => alert("🚩 تم رفع البلاغ بنجاح! الإدارة هتراجع المنشور."))
            .catch(() => alert("❌ فشل رفع البلاغ."));
        }

        // الحذف للمالك أو الكاتب
        function deletePost(postId) {
            if(confirm("هل تريد إزالة هذا المنشور بشكل نهائي وقاطع من قاعدة البيانات؟")) {
                fetch(`${API_URL}/delete_post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId: postId })
                })
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(() => renderPosts())
                .catch(() => alert("❌ فشل حذف المنشور."));
            }
        }

        // تشغيل فوري
        renderPosts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أستريتز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        /* ألوان تويتر/إكس الهادئة */
        body { font-family: 'Cairo', sans-serif; background-color: #000000; color: #e7e9ea; padding-bottom: 60px; overflow-x: hidden; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border-top: 1px solid #2f3336; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #71767b; text-decoration: none; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #1d9bf0; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تصميم البوست (تويتر ستايل) */
        .tweet { display: flex; gap: 10px; border-bottom: 1px solid #2f3336; padding: 15px 0; }
        .tweet-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #333; flex-shrink: 0; }
        .tweet-body { flex-grow: 1; }
        .tweet-header { font-size: 15px; font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .tweet-author { color: #e7e9ea; }
        .tweet-admin-badge { color: #ffd700; font-size: 12px; margin-right: 5px; }
        .tweet-text { font-size: 15px; color: #e7e9ea; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; }
        
        /* أزرار التفاعل */
        .tweet-actions { display: flex; justify-content: space-between; align-items: center; color: #71767b; font-size: 13px; max-width: 300px; }
        .action-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; }
        .action-btn.liked { color: #f91880; }
        .action-btn:hover { filter: brightness(1.2); }
        .admin-delete { color: #f4212e; display: none; } /* يظهر للأدمن فقط */

        /* صفحة الكتابة */
        textarea { width: 100%; background-color: transparent; border: none; border-bottom: 1px solid #2f3336; padding: 10px 0; color: white; font-family: 'Cairo', sans-serif; font-size: 18px; resize: none; margin-bottom: 15px; outline: none; }
        .submit-btn { background-color: #1d9bf0; color: white; border: none; padding: 10px 20px; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 15px; border-radius: 20px; cursor: pointer; float: left; }
        
        /* شاشة التعليقات المنبثقة (Modal) */
        .comments-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 2000; padding: 15px; overflow-y: auto; }
        .comments-modal.active { display: block; }
        .close-modal { font-size: 24px; color: #e7e9ea; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .comment-input-area { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #2f3336; padding-top: 15px; }
        .comment-input-area input { flex-grow: 1; background: #202327; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-family: 'Cairo'; }
        .comment-btn { background: #1d9bf0; border: none; color: white; border-radius: 20px; padding: 0 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="feed-page" class="page active">
        <div id="posts-container"></div>
    </div>

    <div id="write-page" class="page">
        <textarea id="post-text" rows="4" placeholder="ماذا يحدث؟..."></textarea>
        <button class="submit-btn" onclick="publishPost()">نشر</button>
        <div style="clear: both;"></div>
    </div>

    <div id="profile-page" class="page">
        <div style="text-align: center; margin-bottom: 20px;">
            <img id="user-img" src="https://via.placeholder.com/80" style="width:80px; border-radius:50%; margin-bottom:10px;">
            <h2 id="user-name">زائر</h2>
        </div>
        <hr style="border-color: #2f3336; margin-bottom: 10px;">
        <h3 style="font-size: 16px; margin-bottom: 10px; color: #71767b;">منشوراتك:</h3>
        <div id="my-posts-container"></div>
    </div>

    <div id="comments-modal" class="comments-modal">
        <span class="close-modal" onclick="closeComments()">× العودة</span>
        <div id="active-post-view" style="border-bottom: 1px solid #2f3336; padding-bottom: 15px; margin-bottom: 15px;"></div>
        <div id="comments-list"></div>
        <div class="comment-input-area">
            <input type="text" id="comment-text" placeholder="اكتب ردك...">
            <button class="comment-btn" onclick="addComment()">رد</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('feed-page', this)">🏠<br>الرئيسية</div>
        <div class="nav-item" onclick="switchPage('write-page', this)">✍️<br>نشر</div>
        <div class="nav-item" onclick="switchPage('profile-page', this)">👤<br>بروفايل</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const ADMIN_ID = 1078701974; // الآي دي بتاعك
        let currentUser = { id: 123, name: "زائر", photo: "" };

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            currentUser = {
                id: tg.initDataUnsafe.user.id,
                name: tg.initDataUnsafe.user.first_name,
                photo: tg.initDataUnsafe.user.photo_url || "https://via.placeholder.com/40"
            };
            document.getElementById('user-name').innerText = currentUser.name;
            if(currentUser.photo) document.getElementById('user-img').src = currentUser.photo;
        }

        // قاعدة بيانات محلية "نظيفة" (صفر منشورات)
        let posts = [];
        let activePostId = null;

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            if(pageId === 'feed-page') renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = posts.length === 0 ? "<p style='text-align:center; color:#71767b; margin-top:20px;'>لا توجد منشورات بعد، كن أول من ينشر!</p>" : "";
            
            // نعرض البوستات الأحدث فوق
            [...posts].reverse().forEach(post => {
                const isLiked = post.likedBy.includes(currentUser.id);
                const isAdmin = currentUser.id === ADMIN_ID;
                const adminBadge = post.authorId === ADMIN_ID ? "<span class='tweet-admin-badge'>👑 المالك</span>" : "";
                
                container.innerHTML += `
                    <div class="tweet" id="post-${post.id}">
                        <img src="${post.authorPhoto}" class="tweet-avatar">
                        <div class="tweet-body">
                            <div class="tweet-header">
                                <span class="tweet-author">${post.authorName} ${adminBadge}</span>
                            </div>
                            <div class="tweet-text">${post.text}</div>
                            <div class="tweet-actions">
                                <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                    ${isLiked ? '❤️' : '🤍'} ${post.likedBy.length}
                                </div>
                                <div class="action-btn" onclick="openComments(${post.id})">💬 ${post.comments.length}</div>
                                <div class="action-btn" onclick="reportPost(${post.id})">🚩 بلاغ</div>
                                ${isAdmin || post.authorId === currentUser.id ? `<div class="action-btn admin-delete" style="display:flex;" onclick="deletePost(${post.id})">🗑️ حذف</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function publishPost() {
            const txt = document.getElementById('post-text').value.trim();
            if(!txt) return;
            
            posts.push({
                id: Date.now(),
                authorId: currentUser.id,
                authorName: currentUser.name,
                authorPhoto: currentUser.photo,
                text: txt,
                likedBy: [], // مصفوفة لتخزين من قام بالإعجاب لمنع التكرار
                comments: [] // مصفوفة لتخزين التعليقات
            });
            
            document.getElementById('post-text').value = ''; 
            switchPage('feed-page', document.querySelectorAll('.nav-item')[0]);
        }

        // الإعجاب الحقيقي: ضغطة تحط لايك، ضغطة تشيله
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if(!post) return;
            
            const index = post.likedBy.indexOf(currentUser.id);
            if(index === -1) {
                post.likedBy.push(currentUser.id); // إضافة لايك
            } else {
                post.likedBy.splice(index, 1); // إزالة اللايك
            }
            renderPosts();
        }

        // فتح التعليقات
        function openComments(postId) {
            activePostId = postId;
            const post = posts.find(p => p.id === postId);
            document.getElementById('comments-modal').classList.add('active');
            renderCommentsView(post);
        }

        function closeComments() {
            document.getElementById('comments-modal').classList.remove('active');
            activePostId = null;
            renderPosts(); // تحديث الأرقام برة
        }

        function renderCommentsView(post) {
            document.getElementById('active-post-view').innerHTML = `<div style="color:#e7e9ea;">${post.text}</div>`;
            const list = document.getElementById('comments-list');
            list.innerHTML = post.comments.length === 0 ? "<div style='color:#71767b; font-size:13px;'>لا توجد تعليقات، كن أول من يرد!</div>" : "";
            
            post.comments.forEach(c => {
                list.innerHTML += `
                    <div style="margin-top: 10px; padding: 10px; background: #16181c; border-radius: 10px;">
                        <strong style="color:#1d9bf0; font-size:13px;">👤 ${c.authorName}</strong>
                        <div style="color:#e7e9ea; font-size:14px; margin-top:4px;">${c.text}</div>
                    </div>
                `;
            });
        }

        function addComment() {
            const txt = document.getElementById('comment-text').value.trim();
            if(!txt || !activePostId) return;
            
            const post = posts.find(p => p.id === activePostId);
            post.comments.push({ authorName: currentUser.name, text: txt });
            document.getElementById('comment-text').value = '';
            renderCommentsView(post);
        }

        function reportPost(postId) {
            alert("تم إرسال البلاغ لمالك المنصة وسيتم مراجعته فوراً. 🚩");
            // هيتم ربطها بالبوت لاحقاً لترسل رسالة لك
        }

        function deletePost(postId) {
            if(confirm("هل أنت متأكد من حذف هذا المنشور نهائياً؟")) {
                posts = posts.filter(p => p.id !== postId);
                renderPosts();
            }
        }

        renderPosts();
    </script>
</body>
</html>
